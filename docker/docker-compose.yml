services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${FF_APP_PORT:-8080}:8080"
    volumes:
      - ffm_data:/data
    environment:
      QUARKUS_PROFILE: prod
      FF_DB_PATH: /data/ffm.db
      FF_ADMIN_USERNAME: ${FF_ADMIN_USERNAME:-admin}
      FF_ADMIN_PASSWORD: ${FF_ADMIN_PASSWORD:-admin}
      FF_TOKEN_PEPPER: ${FF_TOKEN_PEPPER:-change-me-in-production}
      FF_JWT_ISSUER: ${FF_JWT_ISSUER:-feature-flag-manager}
      FF_JWT_AUDIENCE: ${FF_JWT_AUDIENCE:-feature-flag-admin}

volumes:
  ffm_data:
