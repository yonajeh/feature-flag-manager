quarkus.application.name=feature-flag-manager

# Database — URL set in prod profile; dev/test use Dev Services
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${FF_DB_USER:ffm}
quarkus.datasource.password=${FF_DB_PASSWORD:ffm}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JWT
mp.jwt.verify.publickey.location=${FF_JWT_PUBLIC_KEY_PATH:META-INF/resources/publicKey.pem}
smallrye.jwt.sign.key.location=${FF_JWT_PRIVATE_KEY_PATH:META-INF/resources/privateKey.pem}
mp.jwt.verify.issuer=${FF_JWT_ISSUER:feature-flag-manager}
mp.jwt.verify.audiences=${FF_JWT_AUDIENCE:feature-flag-admin}

# Admin credentials
ff.admin.username=${FF_ADMIN_USERNAME:admin}
ff.admin.password=${FF_ADMIN_PASSWORD:admin}

# Token pepper
ff.token.pepper=${FF_TOKEN_PEPPER:dev-pepper-change-in-production}

# OpenAPI
quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.extensions.smallrye.info.title=Feature Flag Manager API
mp.openapi.extensions.smallrye.info.version=1.0.0

# Health
quarkus.smallrye-health.root-path=/q/health

# CORS for dev
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Security — JWT enforced via @RolesAllowed on admin resources; login is @PermitAll
quarkus.http.auth.proactive=false
